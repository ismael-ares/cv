name: Build and deploy CV

on:
  push:
    branches: [main]
    paths:
      - 'cv.tex'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp cv.pdf _site/cv.pdf
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=cv.pdf">
            <title>CV — Ismael Ares Fagil</title>
          </head>
          <body>
            <a href="cv.pdf">Open CV</a>
          </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  report:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Generate ATS report
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Run the /cv-ats skill in report mode: audit cv.tex, score it out of 100,
            and write the full markdown report to cv-ats-report.md in the repo root.
            Do not modify cv.tex.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 20
            --allowedTools Read,Write,Glob,Skill

      - name: Publish report to step summary
        run: cat cv-ats-report.md >> "$GITHUB_STEP_SUMMARY"
